name: Deploy to Cloudflare Workers

concurrency:
  group: deploy

# Triggered manually for now. Re-enable the push trigger below once the
# decoupled `@mridang/nestjs-defaults` is published to npm — until then a clean
# `npm ci` pulls the AWS-coupled registry build, and the deployed Worker would
# carry the winston/stdout logging bug that the locally patched build fixes.
on:
  workflow_dispatch:
  # push:
  #   branches:
  #     - master

defaults:
  run:
    working-directory: ./

jobs:
  deploy-app:
    environment:
      name: production
    runs-on: ubuntu-latest

    steps:
      - name: Runner Common Setup
        uses: mridang/action-runner-common@v1

      - name: Checkout code
        uses: actions/checkout@v5
        with:
          fetch-depth: 0

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          cache: 'npm'
          node-version-file: '.nvmrc'

      - name: Install Dependencies
        run: npm ci

      - name: Deploy to Cloudflare
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
        run: npm run deploy
