name: Deploy to Cloudflare Workers

concurrency:
  group: deploy

# Deploys on every push to master, plus manual runs. The decoupled
# `@mridang/nestjs-defaults` (v3) is on npm, so a clean `npm ci` pulls a
# Workers-safe build.
on:
  workflow_dispatch:
  push:
    branches:
      - master

defaults:
  run:
    working-directory: ./

jobs:
  deploy-app:
    environment:
      name: production
    runs-on: ubuntu-latest

    steps:
      - name: Runner Common Setup
        uses: mridang/action-runner-common@v1

      - name: Checkout code
        uses: actions/checkout@v5
        with:
          fetch-depth: 0

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          cache: 'npm'
          node-version-file: '.nvmrc'

      - name: Install Dependencies
        run: npm ci

      - name: Deploy to Cloudflare
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
        run: npm run deploy
