name: Run Canary

on:
  workflow_dispatch:
    inputs:
      release_identifier:
        description: 'Release identifier'
        required: true

defaults:
  run:
    working-directory: ./

jobs:
  run-canary:
    runs-on: ubuntu-latest

    steps:
      - name: Runner Common Setup
        uses: mridang/action-runner-common@v1

      - name: Write inputs to file
        run: |
          echo "${{ github.event.inputs.release_identifier }}" > release.txt

      - name: Upload release identifier
        uses: actions/upload-artifact@v4
        with:
          name: release
          path: release.txt

      - name: Checkout code
        uses: actions/checkout@v5

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          cache: 'npm'
          node-version-file: '.nvmrc'

      - name: Install Dependencies
        run: npm ci --no-optional --no-optional

      - name: Run Cypress Tests
        uses: cypress-io/github-action@v6
        with:
          browser: chrome
          build: npm run build
          start: npx wrangler dev --port 3000
          wait-on: 'http://localhost:3000/'
        env:
          AWS_ACCESS_KEY_ID: ${{ secrets.AWS_ACCESS_KEY_ID }}
          AWS_SECRET_ACCESS_KEY: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          AWS_REGION: ${{ vars.AWS_REGION }}
          ACCOUNT_ID: ${{ vars.ACCOUNT_ID }}
          NODE_ENV: 'test'
